<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">AI Skill Create banner</title>
  <desc id="desc">A workflow banner showing brief intake, skill design, validation, plugin packaging, and public release readiness.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#082F49"/>
      <stop offset="0.42" stop-color="#0F766E"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panel" x1="120" y1="80" x2="1060" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#E0F2FE" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <g opacity="0.16" stroke="#F8FAFC" stroke-width="2">
    <path d="M0 96h1200M0 184h1200M0 272h1200M0 360h1200"/>
    <path d="M104 0v420M264 0v420M424 0v420M584 0v420M744 0v420M904 0v420M1064 0v420"/>
  </g>
  <rect x="86" y="68" width="1028" height="284" rx="30" fill="url(#panel)" filter="url(#shadow)"/>
  <text x="126" y="142" fill="#0F172A" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="800">AI Skill Create</text>
  <text x="128" y="190" fill="#164E63" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="600">Design, validate, forward-test, and package Codex skills from real briefs.</text>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">
    <rect x="130" y="235" width="170" height="62" rx="16" fill="#0F766E"/>
    <text x="164" y="274" fill="#F8FAFC">Brief intake</text>
    <path d="M315 266h52" stroke="#164E63" stroke-width="8" stroke-linecap="round"/>
    <path d="m356 251 18 15-18 15" fill="none" stroke="#164E63" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="390" y="235" width="170" height="62" rx="16" fill="#2563EB"/>
    <text x="426" y="274" fill="#F8FAFC">Skill shape</text>
    <path d="M575 266h52" stroke="#164E63" stroke-width="8" stroke-linecap="round"/>
    <path d="m616 251 18 15-18 15" fill="none" stroke="#164E63" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="650" y="235" width="170" height="62" rx="16" fill="#0F766E"/>
    <text x="692" y="274" fill="#F8FAFC">Validate</text>
    <path d="M835 266h52" stroke="#164E63" stroke-width="8" stroke-linecap="round"/>
    <path d="m876 251 18 15-18 15" fill="none" stroke="#164E63" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="910" y="235" width="170" height="62" rx="16" fill="#111827"/>
    <text x="944" y="274" fill="#F8FAFC">Package</text>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M990 114v34M973 131h34" stroke="#0F766E" stroke-width="8"/>
    <path d="m1024 150 17 17 38-45" stroke="#2563EB" stroke-width="10"/>
  </g>
</svg>
